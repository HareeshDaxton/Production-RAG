# Production RAG — application configuration (non-secret).
# Secrets (OPENAI_API_KEY, etc.) live in .env, never here.
# Thresholds/models/paths are config-driven: change here, not in code.

app:
  name: production-rag
  environment: development        # development | staging | production
  log_level: INFO                 # DEBUG | INFO | WARNING | ERROR

paths:
  data_dir: data
  chroma_dir: data/chroma
  sqlite_path: data/audit/app.sqlite
  bm25_dir: data/bm25_index

models:
  # Local, free, CPU. Query-side instruction prefix improves bge retrieval.
  embedding:
    provider: local
    name:  BAAI/bge-base-en-v1.5  #Better accuracy , BAAI/bge-small-en-v1.5->Good for development
    dimensions: 768   # bge-base=768, bge-small=384, bge-large=1024 (must match the model)
    device: cpu
    query_prefix: "Represent this sentence for searching relevant passages: "
    batch_size: 64
    normalize: true

  # Local cross-encoder; used from Phase 2 (second-pass precision).
  reranker:
    provider: local
    name: cross-encoder/ms-marco-MiniLM-L-6-v2
    device: cpu

  # Final grounded answer. API only.
  generation:
    provider: openai
    name: gpt-4o
    temperature: 0.1
    max_tokens: 1000
    timeout: 30

  # Citation verification / eval labeling. Configurable (openai | ollama).
  judge:
    provider: openai
    name: gpt-4o-mini
    temperature: 0.0

retrieval:
  default_top_k: 5              # final chunks handed to generation
  mode: hybrid                  # hybrid (dense+BM25+RRF+rerank) | dense (Phase 1 path). Per-request override via AskRequest.mode
  dense_candidates: 20          # dense pool size before fusion
  sparse_candidates: 20         # BM25 pool size before fusion
  rrf_k: 60                     # Reciprocal Rank Fusion damping constant
  dense_weight: 1.0             # RRF weight for dense ranking
  sparse_weight: 1.0            # RRF weight for BM25 ranking
  rerank_candidates: 20         # fused candidates rescored by the cross-encoder

ingestion:
  corpus:
    dir: data/corpus            # default source for /v1/ingest (populate via scripts/fetch_corpus.py)
  chunking:
    strategy: recursive         # recursive (by headers) | fixed (token windows) | semantic (embedding-based)
    max_chunk_tokens: 512
    overlap_tokens: 64
    min_chunk_chars: 40
    semantic_threshold: 0.6     # cosine sim below which the semantic chunker starts a new chunk
