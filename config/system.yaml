# Production RAG — application configuration (non-secret).
# Secrets (OPENAI_API_KEY, etc.) live in .env, never here.
# Thresholds/models/paths are config-driven: change here, not in code.

app:
  name: production-rag
  environment: development        # development | staging | production
  log_level: INFO                 # DEBUG | INFO | WARNING | ERROR

paths:
  data_dir: data
  chroma_dir: data/chroma
  sqlite_path: data/audit/app.sqlite
  bm25_dir: data/bm25_index

models:
  # Local, free, CPU. Query-side instruction prefix improves bge retrieval.
  embedding:
    provider: local
    name:  BAAI/bge-base-en-v1.5  #Better accuracy , BAAI/bge-small-en-v1.5->Good for development
    dimensions: 768   # bge-base=768, bge-small=384, bge-large=1024 (must match the model)
    device: cpu
    query_prefix: "Represent this sentence for searching relevant passages: "
    batch_size: 64
    normalize: true

  # Local cross-encoder; used from Phase 2 (second-pass precision).
  reranker:
    provider: local
    name: cross-encoder/ms-marco-MiniLM-L-6-v2
    device: cpu

  # Final grounded answer. API only.
  generation:
    provider: openai
    name: gpt-4o-mini      # cheaper answers for eval/dev; bump to gpt-4o for best quality
    temperature: 0.1
    max_tokens: 1000
    timeout: 30

  # Citation verification / eval labeling. Configurable (openai | ollama).
  judge:
    provider: openai
    name: gpt-4o-mini
    temperature: 0.0

retrieval:
  default_top_k: 5              # final chunks handed to generation
  mode: hybrid                  # hybrid (dense+BM25+RRF+rerank) | dense (Phase 1 path). Per-request override via AskRequest.mode
  dense_candidates: 20          # dense pool size before fusion
  sparse_candidates: 20         # BM25 pool size before fusion
  rrf_k: 60                     # Reciprocal Rank Fusion damping constant
  dense_weight: 1.0             # RRF weight for dense ranking
  sparse_weight: 1.0            # RRF weight for BM25 ranking
  rerank_candidates: 20         # fused candidates rescored by the cross-encoder

ingestion:
  corpus:
    dir: data/corpus            # default source for /v1/ingest (populate via scripts/fetch_corpus.py)
  chunking:
    strategy: recursive         # recursive (by headers) | fixed (token windows) | semantic (embedding-based)
    max_chunk_tokens: 512
    overlap_tokens: 64
    min_chunk_chars: 40
    semantic_threshold: 0.6     # cosine sim below which the semantic chunker starts a new chunk

quality:                        # Phase 3: citation verification + composite confidence + graceful IDK
  verify_citations: true        # run the LLM judge over citations (false = skip, saves cost)
  idk_threshold: 0.45           # composite confidence below this → graceful "I don't know"
  confidence_weights:           # how the 3 signals combine into the composite score (should sum to 1.0)
    retrieval: 0.4              # Phase 2 retrieval confidence
    citation: 0.4              # fraction of citations the judge supports
    self: 0.2                  # model's own self-reported confidence

eval:                           # Phase 4: evaluation harness (the regression gate)
  golden_path: eval/golden_set.jsonl   # human-authored answer key (git-tracked)
  retrieval_k: 5                # top_k used when answering eval questions
  regression_tolerance: 0.03    # overall-score drop beyond this counts as a regression
  strategies: [recursive, fixed, semantic]   # chunkers compared by the benchmark

cache:                          # Phase 5: semantic cache (Redis Stack / RediSearch)
  enabled: true                 # false, or Redis down → pipeline runs normally, no cache
  redis_url: redis://localhost:6380   # docker-compose maps redis-stack to host 6380
  threshold: 0.90               # cosine sim >= this → cache HIT (bge paraphrases ~0.90-0.94; unrelated ~0.47)
  near_miss_margin: 0.10        # sim in [0.80, 0.90) logged as near-miss, NOT served
  ttl_seconds: 86400            # cached entry lifetime (1 day)
  index_name: rag_cache_idx
  key_prefix: "cache:"
  cost_per_answer_usd: 0.002    # estimate used for the cost-saved metric
